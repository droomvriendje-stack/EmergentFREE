<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Droomvriendjes</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #faf5ff;
      color: #1f2937;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      background: #ffffff;
      border-radius: 1.5rem;
      box-shadow: 0 4px 24px rgba(124, 58, 237, 0.1);
      padding: 3rem 2.5rem;
      max-width: 480px;
      width: 100%;
      text-align: center;
    }

    .logo {
      font-size: 3rem;
      margin-bottom: 1rem;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      color: #7c3aed;
      margin-bottom: 0.5rem;
    }

    .tagline {
      font-size: 1rem;
      color: #6b7280;
      margin-bottom: 2rem;
      line-height: 1.6;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: #f0fdf4;
      color: #16a34a;
      border: 1px solid #bbf7d0;
      border-radius: 9999px;
      padding: 0.35rem 1rem;
      font-size: 0.875rem;
      font-weight: 500;
      margin-bottom: 2rem;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      background: #22c55e;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .btn {
      display: block;
      padding: 0.75rem 1.5rem;
      border-radius: 0.75rem;
      font-size: 0.95rem;
      font-weight: 600;
      text-decoration: none;
      transition: opacity 0.15s ease, transform 0.15s ease;
    }

    .btn:hover {
      opacity: 0.85;
      transform: translateY(-1px);
    }

    .btn-primary {
      background: #7c3aed;
      color: #ffffff;
    }

    .btn-secondary {
      background: #f3f4f6;
      color: #374151;
    }

    footer {
      margin-top: 2rem;
      font-size: 0.8rem;
      color: #9ca3af;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🧸</div>
    <h1>Droomvriendjes</h1>
    <p class="tagline">Lieve slaapknuffels voor de allerkleinsten.<br />Handgemaakt met liefde.</p>

    <div class="status-badge">
      <span class="status-dot"></span>
      API online
    </div>

    <div class="links">
      <a href="/api/health" class="btn btn-primary">API Health Check</a>
      <a href="/docs" class="btn btn-secondary">API Documentatie (Swagger)</a>
      <a href="/redoc" class="btn btn-secondary">API Documentatie (ReDoc)</a>
    </div>
  </div>

  <footer>
    &copy; <span id="year"></span> Droomvriendjes &mdash; Alle rechten voorbehouden
  </footer>

  <script>
    document.getElementById("year").textContent = new Date().getFullYear();
  </script>
</body>
</html>
