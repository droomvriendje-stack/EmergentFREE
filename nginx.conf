server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Cache static assets aggressively
    location ~* ^/assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Health check endpoint for Railway
    location /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok";
    }

    # /api/ proxy — to be configured once the backend API service is deployed on Railway.
    # Replace <backend-internal-host> with the backend service's internal hostname, e.g.:
    #   proxy_pass http://api.railway.internal:8000;
    #
    # location /api/ {
    #     proxy_pass http://<backend-internal-host>;
    #     proxy_http_version 1.1;
    #     proxy_set_header Host <backend-internal-host>;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    #     proxy_connect_timeout 30s;
    #     proxy_read_timeout 60s;
    # }

    # SPA fallback: all routes to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}