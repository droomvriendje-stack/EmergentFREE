# Frontend (web) service — uses the default Dockerfile (nginx)
[services.web.build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[services.web.build.args]
VITE_API_URL = "https://api.railway.internal:8000"

[services.web.deploy]
healthcheckPath = "/health"
healthcheckTimeout = 30

# Backend (api) service — uses Dockerfile.backend (Python/FastAPI)
[services.api.build]
builder = "dockerfile"
dockerfilePath = "Dockerfile.backend"

[services.api.deploy]
healthcheckPath = "/health"
healthcheckTimeout = 30
