# Frontend (website) service — uses the default Dockerfile (nginx)
[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[build.args]
VITE_API_URL = "https://web-production-3e5df6.up.railway.app"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 30

# Backend (web) service — uses Dockerfile.backend
# No startCommand override: the Dockerfile CMD is used directly.
[services.web.build]
builder = "dockerfile"
dockerfilePath = "Dockerfile.backend"

[services.web.deploy]
healthcheckPath = "/health"
healthcheckTimeout = 30
