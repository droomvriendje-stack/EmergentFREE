# Railway Configuration for Droomvriendjes Backend

[build]
builder = "dockerfile"
rootDirectory = "backend"

[deploy]
startCommand = "sh -c 'uvicorn server:app --host 0.0.0.0 --port $PORT'"
healthcheckPath = "/health"
healthcheckTimeout = 100
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10
